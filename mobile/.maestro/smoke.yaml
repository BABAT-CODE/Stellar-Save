# Smoke suite — runs critical flows in sequence
# A failure in any flow fails the entire suite deterministically.
appId: com.stellarsave.app
---
# ── Onboarding ────────────────────────────────────────────────────────────────
- launchApp:
    clearState: true
- assertVisible:
    id: "welcome-screen"
- assertVisible:
    text: "Stellar Save"
- tapOn:
    id: "get-started-button"
- assertVisible:
    id: "wallet-connect-screen"
- assertVisible:
    text: "Connect Your Wallet"
- back

# ── Wallet creation abbreviated check ────────────────────────────────────────
- tapOn:
    id: "get-started-button"
- tapOn:
    text: "Create New Wallet"
- assertVisible:
    id: "create-wallet-screen"
- back
- back

# ── App navigation (tab bar) ──────────────────────────────────────────────────
- launchApp
- assertVisible:
    id: "dashboard-screen"
- tapOn:
    id: "browse-groups-tab"
- assertVisible:
    id: "browse-groups-screen"
- tapOn:
    id: "profile-tab"
- assertVisible:
    id: "profile-screen"
- tapOn:
    id: "dashboard-tab"
- assertVisible:
    id: "dashboard-screen"

# ── Create group form opens and validates ────────────────────────────────────
- tapOn:
    id: "create-group-fab"
- assertVisible:
    id: "create-group-screen"
- assertVisible:
    text: "Create Savings Group"
- assertVisible:
    id: "group-name-input"
- assertVisible:
    id: "contribution-amount-input"
- back

# ── Browse & join flow entry point ───────────────────────────────────────────
- tapOn:
    id: "browse-groups-tab"
- assertVisible:
    id: "browse-groups-screen"
- assertVisible:
    id: "group-search-input"

# ── Contribution entry point from dashboard ──────────────────────────────────
- tapOn:
    id: "dashboard-tab"
- assertVisible:
    id: "dashboard-screen"
